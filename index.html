<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: grid;
            place-items: center;
        }
        p{
            animation: infirotate 10s linear infinite;
            font-size: 20px;
            height: 300px;
        }
        span { 
            position: absolute;
            transform: rotate(0deg);
            transform-origin: 0 100px;
        }
        @keyframes infirotate{
            from{
                transform :rotate(0deg)
            }
            to{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    
    <p>가주앙리ㅏㅓㅂ리ㅏㅓ   ㅂ리qh-ㅏㅓㅂ리</p>
    <script>
        const p = document.querySelector('p')
        p.innerHTML = p.textContent.replace(/\S/g,"<span>$&</span>")
        console.log(p)
        const span = document.querySelectorAll('span')

        console.log(span)
        for(let i=1; i<span.length; i++){
            span[i].style.transform = `rotate(${i*18.5}deg)`
        }
</script>
</body>
</html>
